<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Orden</title>

  <script src="js/authGuard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
    checkAuth("admin")
  </script>
</head>
<body>

<h1>Crear Orden de Producción</h1>

<form id="formTarea">

  <div>
    <label>Número de tarea</label><br>
    <input type="text" id="numero_tarea" required>
  </div>

  <br>

  <div>
    <label>Modelo</label><br>
    <select id="modelo" required>
      <option value="">Seleccionar modelo</option>
    </select>
  </div>

  <br>

  <div>
    <label>Total pares</label><br>
    <input type="number" id="total_pares_input" min="1" placeholder="Ej: 120" required>
  </div>

  <br>

  <button type="button" id="btnCalcular">Calcular talles</button>

  <h3>Plan de talles</h3>
  <div id="tallesPreview"></div>

  <br>

  <div>
    Total pares calculados: <span id="total">0</span>
  </div>

  <br>

  <div id="mensajeOrden"></div>

  <br>

  <button type="submit" id="btnCrearOrden">Crear Orden</button>
  <button type="button" onclick="cargarModulo('ordenes')">Volver</button>

</form>

</body>
</html>
