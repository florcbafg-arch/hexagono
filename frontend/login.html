<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Login - HEXAFLOW</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="auth-container">
    <div class="auth-card">

      <div class="logo">HEXAFLOW</div>
      <div class="subtitulo">Control de producción</div>

      <!-- ✅ FORM CORRECTO -->
      <form id="loginForm">

        <input type="text" id="usuario" placeholder="Email" required>

        <input type="password" id="password" placeholder="Contraseña" required>

        <button type="submit">Ingresar</button>

      </form>

      <!-- ✅ LINK FUERA DEL FORM -->
      <div class="link">
        ¿No tienes cuenta? <a href="registro.html">Crear cuenta</a>
      </div>

    </div>
  </div>

  <!-- ✅ SCRIPT ABAJO -->
  <script>
    document
      .getElementById("loginForm")
      .addEventListener("submit", async (e) => {

        e.preventDefault()

        console.log("CLICK LOGIN 🔥")

        const usuario = document.getElementById("usuario").value
        const password = document.getElementById("password").value

        console.log("DATOS:", usuario, password)

        try {

          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              email: usuario,
              password
            })
          })

          const data = await res.json()

          console.log("RESPUESTA:", data)

          if (data.ok && data.usuario) {

            localStorage.setItem("token", data.token)
            
            localStorage.setItem("hexagono_user", JSON.stringify(data.usuario))
            localStorage.setItem("usuario", data.usuario.nombre)
            localStorage.setItem("puesto_id", data.usuario.puesto_id)
            localStorage.setItem("rol", data.usuario.rol)

            if (data.usuario.rol === "admin") {
              window.location.href = "admin.html"
            } else {
              window.location.href = "operario.html"
            }

          } else {
            alert("Usuario o contraseña incorrectos")
          }

        } catch (error) {
          console.error("ERROR LOGIN:", error)
          alert("Error conectando con el servidor")
        }

      })
  </script>

</body>
</html>
