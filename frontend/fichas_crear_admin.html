<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Ficha Técnica</title>

  <link rel="stylesheet" href="styles.css">

  <script src="js/authGuard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
    checkAuth("admin")
  </script>
</head>

<body>
<div class="container">


  <div class="main">
    <div class="header">Panel Administrador</div>

    <div id="contenido">
      <h1>Crear / Importar Ficha Técnica</h1>

      <div class="form-row">
       <label>Modelo</label>
<input id="modelo" placeholder="Nombre del modelo">

        <label>Código</label>
        <input id="codigo" placeholder="Código de ficha o modelo">

        <label>Nombre</label>
        <input id="nombre" placeholder="Nombre de la ficha">
      </div>

      <div class="form-row">
        <label>Marca</label>
        <input id="marca" placeholder="Marca">

        <label>Horma</label>
        <input id="horma" placeholder="Horma">

        <label>Temporada</label>
        <input id="temporada" placeholder="Temporada">
      </div>

      <div class="form-row">
        <label>Detalle general</label>
        <textarea id="detalle_general" rows="4" placeholder="Detalle general de la ficha"></textarea>
      </div>

      <div class="form-row">
        <label>PDF de ficha técnica</label>
        <input id="pdf_file" type="file" accept="application/pdf">
      </div>

      <div class="form-row">
        <small id="estado_pdf"></small>
      </div>

      <hr>

      <h2>Estructura técnica</h2>
      <p>Completá secciones, piezas, materiales y operaciones para alimentar órdenes e impresión.</p>

      <div class="layout-ficha">

  <!-- IZQUIERDA -->
  <div class="panel-secciones">
    <h3>Secciones</h3>
    <div id="listaSecciones"></div>

    <button type="button" onclick="agregarSeccion()">➕ Agregar sección</button>
  </div>

  <!-- CENTRO -->
  <div class="panel-contenido">
    <h3>Contenido técnico</h3>
    <div id="secciones"></div>
  </div>

  <!-- DERECHA -->
  <div class="panel-preview">
    <h3>Vista previa</h3>
    <div id="previewFicha"></div>
    </div>
  </div>

</div>

      <br>

      <button type="button" onclick="guardarFichaCompleta()">💾 Guardar Ficha</button>
      <button type="button" onclick="volver()">⬅ Volver</button>
    </div>
  </div>

</div>

<script src="js/fichas_crear_admin.js?v=3"></script>
<script>
  function logout() {
    localStorage.removeItem("token")
    localStorage.removeItem("usuario")
    window.location.href = "login.html"
  }
</script>
</body>
</html>
