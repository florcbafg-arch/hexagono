<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Ficha Técnica</title>
  <link rel="stylesheet" href="styles.css">

  <script src="js/authGuard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
    checkAuth("admin")
  </script>
</head>

<body>
<div class="container">

  <aside class="sidebar">
    <h2>HEXAFLOW</h2>
    <ul>
  <li onclick="window.location.href='admin.html'" style="cursor:pointer;">Dashboard</li>
  <li onclick="window.location.href='ordenes_admin.html'" style="cursor:pointer;">Ordenes</li>
  <li onclick="window.location.href='produccion_admin.html'" style="cursor:pointer;">Producción</li>
  <li onclick="window.location.href='usuarios_admin.html'" style="cursor:pointer;">Usuarios</li>
  <li onclick="window.location.href='patrones_admin.html'" style="cursor:pointer;">Patrones</li>
  <li onclick="window.location.href='fichas_admin.html'" style="cursor:pointer;">Fichas Técnicas</li>
  <li onclick="logout()" style="cursor:pointer;">Cerrar sesión</li>
</ul>
  </aside>

  <div class="main">
    <div class="header">Panel Administrador</div>

    <div id="contenido">
      <h1>Crear / Importar Ficha Técnica</h1>

      <div class="form-row">
        <label>Modelo</label>
        <select id="modelo"></select>

        <label>Código</label>
        <input id="codigo" placeholder="Código de ficha o modelo">

        <label>Nombre</label>
        <input id="nombre" placeholder="Nombre de la ficha">
      </div>

      <div class="form-row">
        <label>Marca</label>
        <input id="marca" placeholder="Marca">

        <label>Horma</label>
        <input id="horma" placeholder="Horma">

        <label>Temporada</label>
        <input id="temporada" placeholder="Temporada">
      </div>

      <div class="form-row">
        <label>Detalle general</label>
        <textarea id="detalle_general" rows="4" placeholder="Detalle general de la ficha"></textarea>
      </div>

      <div class="form-row">
        <label>PDF de ficha técnica</label>
        <input id="pdf_file" type="file" accept="application/pdf">
      </div>

      <div class="form-row">
        <small id="estado_pdf"></small>
      </div>

      <hr>

      <h2>Estructura técnica</h2>
      <p>Completá secciones, piezas, materiales y operaciones para alimentar órdenes e impresión.</p>

      <div id="secciones"></div>

      <div style="margin-top: 12px;">
        <button type="button" onclick="agregarSeccion()">➕ Agregar Sección</button>
      </div>

      <br>

      <button type="button" onclick="guardarFichaCompleta()">💾 Guardar Ficha</button>
      <button type="button" onclick="volver()">⬅ Volver</button>
    </div>
  </div>

</div>

<script src="js/fichas_crear_admin.js"></script>
<script>
  function logout() {
    localStorage.removeItem("token")
    localStorage.removeItem("usuario")
    window.location.href = "login.html"
  }
</script>
</body>
</html>
