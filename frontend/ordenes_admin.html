<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Órdenes</title>

  <!-- 🔐 AUTH -->
  <script src="js/authGuard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
    checkAuth("admin")
  </script>
</head>

<body>

<h2>📋 Órdenes de Producción</h2>

<div style="margin-bottom:20px; display:flex; justify-content:space-between; gap:10px;">

  <input 
    type="text" 
    id="buscar" 
    placeholder="Buscar por número de tarea..." 
    style="padding:8px; width:250px;"
  >

  <select id="filtroEstado" style="padding:8px;">
    <option value="">Todos</option>
    <option value="pendiente">Pendiente</option>
    <option value="en_proceso">En proceso</option>
    <option value="terminado">Terminado</option>
  </select>

  <button onclick="cargarModulo('ordenes_crear')">
    ➕ Crear Orden
  </button>

</div>

<table border="1" width="100%" style="border-collapse:collapse;">

  <thead>
    <tr>
      <th>N° Tarea</th>
      <th>Modelo</th>
      <th>Total Pares</th>
      <th>Fecha</th>
      <th>Estado</th>
      <th>Prioridad</th>
      <th>Acciones</th>
    </tr>
  </thead>

  <tbody id="tablaOrdenes">
  </tbody>

</table>

<script src="js/session.js"></script>
<script src="js/ordenes_admin.js"></script>

</body>
</html>
