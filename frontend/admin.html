<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Administrador - HEXAFLOW</title>
  <link rel="stylesheet" href="styles.css">

  <script src="js/authGuard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <script>
    checkAuth("admin")
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 220px;
      background: #1e1e1e;
      color: white;
      padding: 20px;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    .sidebar h2 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar li {
      padding: 12px;
      cursor: pointer;
      border-radius: 6px;
      margin-bottom: 6px;
    }

    .sidebar li:hover {
      background: #333;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .header {
      background: #f4f4f4;
      padding: 15px 20px;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
    }

    #contenido {
      padding: 30px;
      box-sizing: border-box;
      flex: 1;
    }

    .tv-mode .sidebar {
      width: 280px;
    }

    .tv-mode .sidebar li {
      font-size: 20px;
      padding: 16px;
    }

    .tv-mode .header {
      font-size: 22px;
      padding: 20px 24px;
    }

    .tv-mode #contenido {
      font-size: 20px;
      padding: 40px;
    }
  </style>
</head>
<body class="admin-page">

  <div class="container">
    <div class="sidebar">
      <h2>HEXAFLOW</h2>

      <ul>
        <li onclick="cargarModulo('dashboard')">Dashboard</li>
        <li onclick="cargarModulo('ordenes')">Órdenes</li>
        <li onclick="cargarModulo('produccion')">Producción</li>
        <li onclick="cargarModulo('usuarios')">Usuarios</li>
        <li onclick="cargarModulo('patrones')">Patrones</li>
        <li onclick="cargarModulo('fichas')">Fichas Técnicas</li>
        <li onclick="cargarModulo('programacion')">Programación</li>
        <li onclick="cerrarSesion()">Cerrar sesión</li>
      </ul>
    </div>

    <div class="main">
      <div class="header">
        Panel Administrador | 👤 <span id="usuarioNombre"></span>
      </div>

      <div id="contenido">
        <h1>Bienvenido al Panel</h1>
        <p>Seleccioná un módulo desde el menú lateral.</p>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search)

      if (params.get("tv") === "1") {
        document.body.classList.add("tv-mode")
      }

      const user = JSON.parse(localStorage.getItem("hexagono_user"))
      const usuarioNombre = document.getElementById("usuarioNombre")

      if (user && usuarioNombre) {
        usuarioNombre.innerText = user.nombre || user.email || "Admin"
      }

      cargarModulo("dashboard")
    })

    function cerrarSesion() {
      localStorage.removeItem("hexagono_user")
      localStorage.removeItem("token")
      window.location.href = "login.html"
    }

    function cargarModulo(modulo) {
      const contenedor = document.getElementById("contenido")
      if (!contenedor) return

      contenedor.innerHTML = "<p>Cargando módulo...</p>"

      document.querySelectorAll(".modulo-script").forEach(s => s.remove())

      fetch(modulo + "_admin.html")
        .then(res => {
          if (!res.ok) {
            throw new Error("No se pudo cargar " + modulo + "_admin.html")
          }
          return res.text()
        })
        .then(html => {
          contenedor.innerHTML = html

          const script = document.createElement("script")
          script.src = "js/" + modulo + "_admin.js?v=" + Date.now()
          script.classList.add("modulo-script")

          script.onload = () => {
            const nombreInit = "init" + modulo.charAt(0).toUpperCase() + modulo.slice(1)

            // 🔥 FIX para fichas_detalle
if (modulo === "fichas_detalle") {
  nombreInit = "initFichaDetalle"
}

            if (typeof window[nombreInit] === "function") {
              window[nombreInit]()
            } else {
              console.warn("No existe la función:", nombreInit)
            }
          }

          script.onerror = () => {
            console.error("Error cargando script del módulo:", modulo)
          }

          document.body.appendChild(script)
        })
        .catch(error => {
          console.error("Error cargando módulo:", error)
          contenedor.innerHTML = `
            <div style="color:red;">
              Error cargando el módulo <strong>${modulo}</strong>
            </div>
          `
        })
    }
  </script>

</body>
</html>
