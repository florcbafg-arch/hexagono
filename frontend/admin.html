<script>

function cargarModulo(modulo){

  const contenedor = document.getElementById("contenido")

  contenedor.innerHTML = ""

  document.querySelectorAll(".modulo-script").forEach(s => s.remove())

  fetch(modulo + "_admin.html")
    .then(res => res.text())
    .then(html => {

      contenedor.innerHTML = html

      const script = document.createElement("script")
      script.src = "js/" + modulo + "_admin.js"
      script.classList.add("modulo-script")

      document.body.appendChild(script)

      // 🔥 CLAVE TOTAL
      script.onload = () => {

        if(modulo === "dashboard"){
          initDashboard()
        }

      }

    })
}
 

</script>

<script>

function iniciarDashboard(){

function actualizarTiempo(){

const ahora = new Date()

const fecha = ahora.toLocaleDateString()

const hora = ahora.toLocaleTimeString()

const el = document.getElementById("infoTiempo")

if(el){
el.innerHTML = "Fecha: " + fecha + " | Hora actual: " + hora
}

}

setInterval(actualizarTiempo,1000)

actualizarTiempo()

}


</script>
