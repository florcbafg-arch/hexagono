<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Panel Operario - HEXAFLOW</title>

<link rel="stylesheet" href="styles.css">

  <!-- 🔐 AUTH -->
  <script src="js/authGuard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
  window.addEventListener("DOMContentLoaded", () => {
    checkAuth("operario")
  })
</script>
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">

      <div class="logo">HEXAFLOW</div>
      <div class="subtitulo">Panel Operario</div>

      <button class="boton-principal" onclick="irProduccion()">
        Registrar Producción
      </button>

      <button class="boton-secundario" onclick="irFichas()">
        Ver Ficha Técnica
      </button>

      <button class="boton-salir" onclick="logout()">
        Salir
      </button>

    </div>
  </div>

<script>

function irProduccion(){

window.location.href = "produccion.html"

}

function irFichas(){

window.location.href = "fichas_operario.html"

}

function logout() {
  localStorage.removeItem("hexagono_user")
  localStorage.removeItem("token")
  localStorage.removeItem("usuario")
  localStorage.removeItem("puesto_id")
  localStorage.removeItem("rol")
  window.location.href = "login.html"
}

</script>


</body>
</html>
