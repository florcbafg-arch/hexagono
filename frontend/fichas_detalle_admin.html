  <style>
@media print {

  }

    margin: 0 !important;
    padding: 0 !important;

  }

    <button onclick="window.print()">🖨 Imprimir</button>

  </div>

  <div id="hojaFicha"></div>
</div>
  </div>

</div>

<script src="js/fichas_detalle_admin.js"></script>

  }
