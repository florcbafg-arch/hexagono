<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Usuarios - HEXAFLOW</title>
<link rel="stylesheet" href="styles.css">

<!-- 🔐 AUTH -->
  <script src="js/authGuard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
    checkAuth("admin")
  </script>
</head>

<body class="pagina-usuarios">

<h1>Administración de Usuarios</h1>

<div class="container">



<div class="usuarios-layout">


<div class="usuarios-crear">

<h2>Crear Usuario</h2>

<div id="mensajeUsuario" style="
margin-bottom:10px;
font-size:14px;
font-weight:bold;
"></div>

<div class="usuarios-form-grid">


<div class="usuarios-group">
<label>Nombre</label>
<input type="text" id="nombre">
</div>


<div class="usuarios-group">
<label>Usuario</label>
<input type="text" id="username">
</div>

<div class="usuarios-group">
<label>Contraseña</label>
<input type="password" id="password">
</div>

<div class="usuarios-group">
<label>Puesto</label>

<select id="puesto">
<option value="">Seleccionar puesto</option>
</select>

</div>

</div>

<button class="usuarios-btn" onclick="crearUsuario()">
Crear Usuario
</button>

</div>

<div class="section-divider"></div>

<div class="usuarios-lista">

<h2 style="margin-top:40px;">
Lista de Usuarios (<span id="totalUsuarios">0</span>)
</h2>


<table class="tabla-produccion">



<thead>

<tr>
<th>Nombre</th>
<th>Usuario</th>
<th>Puesto</th>
<th>Acciones</th>
</tr>

</thead>


<tbody id="tablaUsuarios">
</tbody>


</table>

</div>

   </div>
</div>

</script>
