<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>HEXAFLOW — Patrones</title>

  <link rel="stylesheet" href="styles.css">

 <!-- 🔐 AUTH -->
  <script src="js/authGuard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
    checkAuth("admin")
  </script>
</head>

  <!-- 🔐 Validación de sesión -->
  <script>
    var usuario = localStorage.getItem("hexagono_user")

    if (!usuario) {
      window.location.href = "login.html"
    }
  </script>

</head>

<body>

<div id="contenido">

  <h2>Patrones</h2>

  <!-- Selector -->
  <div style="margin-bottom: 20px;">
    <label>Modelo:</label>
    <select id="modeloSelect">
      <option value="">Seleccionar modelo</option>
    </select>

    <button onclick="agregarFila()">+ Agregar fila</button>
    <button onclick="guardarPatron()">💾 Guardar</button>
  </div>

  <!-- Tabla -->
  <table border="1" width="100%" id="tablaPatrones">
    <thead>
      <tr>
  <th>Bloque</th>
  <th>Pieza</th>
  <th>Material</th>
  <th>Color</th>
  <th>Unidad</th>
  <th>Consumo</th>
  <th></th>
</tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- Simulación -->
  <div style="margin-top: 30px;">
    <h3>Simular producción</h3>

    <input type="number" id="cantidad" placeholder="Cantidad de pares">

    <button onclick="calcular()">Calcular consumo</button>

    <div id="resultado"></div>
  </div>

</div>

<!-- 🔗 JS -->


</body>
</html>
