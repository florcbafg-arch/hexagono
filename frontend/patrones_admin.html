<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>HEXAFLOW — Patrones</title>

  <!-- 🔥 TU CSS GLOBAL -->
  <link rel="stylesheet" href="styles.css">

  <!-- 🔐 Validación de sesión -->
  <script>
    var usuario = localStorage.getItem("hexagono_user")

    if (!usuario) {
      window.location.href = "login.html"
    }
  </script>

</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>HEXAFLOW</h2>
    <ul>
      <li>Dashboard</li>
      <li>Ordenes</li>
      <li>Producción</li>
      <li>Usuarios</li>
      <li>Patrones</li>
      <li>Fichas Técnicas</li>
      <li>Cerrar sesión</li>
    </ul>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <div class="header">Panel Administrador</div>

    <div id="contenido">

      <h1>Patrones</h1>

      <!-- Selector -->
      <div class="form-row">

        <label>Modelo:</label>
        <select id="modeloSelect">
          <option value="">Seleccionar modelo</option>
        </select>

        <button onclick="agregarFila()">+ Agregar fila</button>
        <button onclick="guardarPatron()">💾 Guardar</button>

      </div>

      <!-- Tabla -->
      <table class="tabla-produccion" id="tablaPatrones">
        <thead>
          <tr>
            <th>Bloque</th>
            <th>Pieza</th>
            <th>Material</th>
            <th>Color</th>
            <th>Unidad</th>
            <th>Consumo</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <!-- Simulación -->
      <div style="margin-top: 30px;">

        <h2>Simular producción</h2>

        <div class="form-row">
          <input type="number" id="cantidad" placeholder="Cantidad de pares">
          <button onclick="calcular()">Calcular consumo</button>
        </div>

        <div id="resultado"></div>

      </div>

    </div>

  </div>

</div>

<!-- 🔗 JS -->
<script src="js/patrones_admin.js"></script>

</body>
</html>
