<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>HEXAFLOW — Patrones</title>
  <link rel="stylesheet" href="styles.css">

  <script src="js/authGuard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
    checkAuth("admin")

    const usuario = localStorage.getItem("hexagono_user")
    if (!usuario) {
      window.location.href = "login.html"
    }
  </script>
</head>
<body onload="initPatrones()">
  <div id="contenido">
    <h2>Patrones</h2>

    <div style="margin-bottom: 20px;">
      <label for="modeloSelect">Modelo:</label>
      <select id="modeloSelect">
        <option value="">Seleccionar modelo</option>
      </select>

      <button onclick="guardarPatron()">💾 Guardar</button>
    </div>

    <table border="1" width="100%" id="tablaPatrones">
      <thead>
        <tr>
          <th>Pieza</th>
          <th>Material</th>
          <th>Color</th>
          <th>U.M</th>
          <th>T. Tarea</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div style="margin-top: 30px;">
      <h3>Simular producción</h3>

      <input type="number" id="cantidad" placeholder="Cantidad de pares">
      <button onclick="calcular()">Calcular consumo</button>

      <div id="resultado"></div>
    </div>
  </div>

  <script src="js/patrones_admin.js"></script>
</body>
</html>
