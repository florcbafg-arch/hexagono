<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>HEXAFLOW — Patrones</title>
  <link rel="stylesheet" href="styles.css">

  <script src="js/authGuard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
    checkAuth("admin")

    const usuario = localStorage.getItem("hexagono_user")
    if (!usuario) {
      window.location.href = "login.html"
    }
  </script>
</head>
<body onload="initPatrones()">
  <div id="contenido">
    <h2>Patrones</h2>

   <div style="margin-bottom: 20px;">
  <label for="modeloSelect">Modelo:</label>
  <select id="modeloSelect">
    <option value="">Seleccionar modelo</option>
  </select>

<button id="btnVerPatron" onclick="abrirModalPatron()">👁 Ver patrón</button>
</div>

    <table border="1" width="100%" id="tablaPatrones">
      <thead>
        <tr>
          <th>Pieza</th>
          <th>Material</th>
          <th>Color</th>
          <th>U.M</th>
          <th>T. Tarea</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div style="margin-top: 30px;">
  <h3>Simular producción</h3>

  <div style="display:flex; gap:10px; align-items:center;">
    <input type="number" id="cantidad" placeholder="Cantidad de pares">
    <button onclick="calcular()">🧮 Calcular consumo</button>
  </div>
</div>

        <div id="modalPatron" class="modal-patron oculto">
      <div class="modal-patron-backdrop" onclick="cerrarModalPatron()"></div>

      <div class="modal-patron-contenido">
        <div class="modal-patron-header">
          <h3>Patrón del artículo</h3>
          <button class="modal-patron-cerrar" onclick="cerrarModalPatron()">✕</button>
        </div>

        <div id="modalPatronBody" class="modal-patron-body">
          <div class="patron-vacio">Seleccioná un modelo para ver el patrón.</div>
        </div>
        <div class="modal-patron-footer">
  <button onclick="guardarPatron()">💾 Guardar patrón</button>
  <button onclick="cerrarModalPatron()" class="modal-secundario">Cerrar</button>
</div>
      </div>
    </div>

  </div>

  <script src="js/patrones_admin.js"></script>
</body>
</html>
