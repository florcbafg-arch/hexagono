<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fichas Técnicas</title>
  <link rel="stylesheet" href="styles.css">

  <script src="js/authGuard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
    checkAuth("admin")
  </script>
</head>

<body>

<div class="container">


  <div class="main">
    <div class="header">Panel Administrador</div>

    <div id="contenido">
      <h1>Fichas Técnicas</h1>

      <div style="margin-bottom:20px;">
  <input
    type="text"
    id="buscador"
    placeholder="Buscar modelo, código o nombre"
    oninput="filtrarFichas()"
  >

  <button onclick="crearFicha()">➕ Nueva Ficha</button>

  <!-- 🔥 BOTÓN NUEVO -->
  <button onclick="document.getElementById('inputExcelFicha').click()">
    📥 Importar Excel
  </button>

  <!-- 🔥 INPUT OCULTO -->
  <input
    type="file"
    id="inputExcelFicha"
    accept=".xlsx,.xls"
    style="display:none"
    onchange="importarExcelFicha(event)"
  >
</div>
      <div style="max-height: 420px; overflow-y: auto; border: 1px solid #444;">
  <table border="1" width="100%" style="border-collapse: collapse;">
    <thead style="position: sticky; top: 0; background: #111; z-index: 1;">
      <tr>
        <th>Modelo</th>
        <th>Código</th>
        <th>Nombre</th>
        <th>Fuente</th>
        <th>PDF</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaFichas"></tbody>
  </table>
</div>

<div id="infoResultadosFichas" style="margin-top:10px; font-size:13px; color:#aaa;"></div>
    </div>
  </div>

</div>


<script>
  function logout() {
    localStorage.removeItem("token")
    localStorage.removeItem("usuario")
    window.location.href = "login.html"
  }
</script>

</body>
</html>
