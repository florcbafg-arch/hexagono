<h1>Fichas Técnicas</h1>

<div class="container-produccion">

<!-- CREAR FICHA -->

<h2>Crear ficha técnica</h2>

<div class="form-grid">

<label>Marca</label> <input id="marca">

<label>Modelo</label> <input id="modelo">

<label>Código</label> <input id="codigo">

<label>Descripción</label> <input id="descripcion">

<label>Material</label> <input id="material">

<label>Color</label> <input id="color">

<label>Tipo de suela</label> <input id="suela">

<label>Tipo de costura</label> <input id="costura">

<label>Tipo de pegado</label> <input id="pegado">

<label>Empaque</label> <input id="empaque">

<label>Imagen</label> <input type="file" id="imagen">

<label>Ficha técnica PDF</label> <input type="file" id="pdf">

</div>

<br>

<button class="btn-guardar" onclick="guardarFicha()">
Guardar ficha
</button>

<hr>

<!-- SUBIR PDF PARA AUTOCOMPLETAR -->

<h2>Subir ficha para autocompletar</h2>

<input type="file" id="pdfAuto">

<button class="btn-secundario" onclick="procesarPDF()">
Procesar PDF
</button>

<p style="font-size:13px;color:#666">
(Si la ficha está en PDF el sistema intentará completar los campos automáticamente)
</p>

<hr>

<!-- BIBLIOTECA -->

<h2>Biblioteca de fichas</h2>

<input id="buscar" placeholder="buscar modelo o marca">

<button onclick="cargarFichas()">Buscar</button>

<div id="tablaFichas"></div>

</div>

<script>

window.guardarFicha = async function(){

const data = new FormData()

data.append("marca", document.getElementById("marca").value)
data.append("nombre", document.getElementById("modelo").value)
data.append("codigo", document.getElementById("codigo").value)
data.append("descripcion", document.getElementById("descripcion").value)

data.append("material", document.getElementById("material").value)
data.append("color", document.getElementById("color").value)
data.append("suela", document.getElementById("suela").value)
data.append("costura", document.getElementById("costura").value)
data.append("pegado", document.getElementById("pegado").value)
data.append("empaque", document.getElementById("empaque").value)

data.append("imagen", document.getElementById("imagen").files[0])
data.append("ficha", document.getElementById("pdf").files[0])

const res = await fetch("/api/modelos",{
method:"POST",
body:data
})

const r = await res.json()

alert("Ficha creada correctamente")

// limpiar campos
document.getElementById("marca").value=""
document.getElementById("modelo").value=""
document.getElementById("codigo").value=""
document.getElementById("descripcion").value=""

document.getElementById("material").value=""
document.getElementById("color").value=""
document.getElementById("suela").value=""
document.getElementById("costura").value=""
document.getElementById("pegado").value=""
document.getElementById("empaque").value=""

document.getElementById("imagen").value=""
document.getElementById("pdf").value=""

cargarFichas()

}

async function cargarFichas(){

const filtro = document.getElementById("buscar").value.toLowerCase()

const res = await fetch("/api/modelos")

const modelos = await res.json()

let encontrados = 0

let html = `
<table class="tabla-produccion">

<tr>
<th>Marca</th>
<th>Modelo</th>
<th>Código</th>
<th>Ficha</th>
</tr>
`

const filtrados = modelos.filter(m=>{
const texto = (m.marca+" "+m.nombre+" "+m.codigo).toLowerCase()
return !filtro || texto.includes(filtro)
})

const inicio = (paginaActual-1) * porPagina
const pagina = filtrados.slice(inicio, inicio + porPagina)

pagina.forEach(m=>{


encontrados++

html += `

<tr>

<td>${m.marca}</td>
<td>${m.nombre}</td>
<td>${m.codigo}</td>

<td>

<a href="/uploads/${m.ficha_pdf}" target="_blank">
<button class="btn-secundario">Ver</button>
</a>

<a href="/uploads/${m.ficha_pdf}" download>
<button class="btn-guardar">Descargar</button>
</a>

</td>

</tr>
`

})

if(encontrados === 0){
html += `
<tr>
<td colspan="4" style="text-align:center;padding:20px;">
No se encontraron fichas
</td>
</tr>
`
}

html += "</table>"

html += `
<div style="margin-top:10px;text-align:center">

<button onclick="paginaAnterior()">Anterior</button>
<span style="margin:0 10px">Página ${paginaActual}</span>
<button onclick="paginaSiguiente()">Siguiente</button>

</div>
`

document.getElementById("tablaFichas").innerHTML = html

}

function paginaAnterior(){

if(paginaActual > 1){
paginaActual--
cargarFichas()
}

}

function paginaSiguiente(){

paginaActual++
cargarFichas()

}

function procesarPDF(){

alert("En la V2 el sistema leerá el PDF y completará la ficha automáticamente")

}

let paginaActual = 1
const porPagina = 6

cargarFichas()

</script>
