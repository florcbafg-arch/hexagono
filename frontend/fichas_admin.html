<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fichas Técnicas</title>

  <link rel="stylesheet" href="styles.css">

  <script src="js/authGuard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
    checkAuth("admin")
  </script>
</head>

<body>

  <h1>Fichas Técnicas</h1>

  <div style="margin-bottom:20px;">
    <input
      type="text"
      id="buscador"
      placeholder="Buscar modelo, código o nombre"
      oninput="filtrarFichas()"
    >
    <button onclick="crearFicha()">➕ Nueva Ficha</button>
  </div>

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>Modelo</th>
        <th>Código</th>
        <th>Nombre</th>
        <th>Fuente</th>
        <th>PDF</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaFichas"></tbody>
  </table>

  <script src="js/fichas_admin.js"></script>
</body>
</html>
