<h1>Fichas Técnicas</h1>

<div style="margin-bottom:20px;">
  <input
    type="text"
    id="buscador"
    placeholder="Buscar modelo, código o nombre"
    oninput="filtrarFichas()"
  >
  <button onclick="crearFicha()">➕ Nueva Ficha</button>
</div>

<table border="1" width="100%">
  <thead>
    <tr>
      <th>Modelo</th>
      <th>Código</th>
      <th>Nombre</th>
      <th>Fuente</th>
      <th>PDF</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody id="tablaFichas"></tbody>
</table>
