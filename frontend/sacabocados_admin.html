<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo de Sacabocados</title>
  <link rel="stylesheet" href="styles.css">

  <script src="js/authGuard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
    checkAuth("admin")
  </script>
</head>

<body>
<div class="container">
  <div class="main">
    <div class="header">Panel Administrador</div>

    <div id="contenido">
      <h1>Catálogo de Sacabocados</h1>

      <div style="margin-bottom:20px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <input
          type="text"
          id="buscadorSacabocados"
          placeholder="Buscar por código, marca o pieza"
          oninput="filtrarSacabocados()"
        >

        <button type="button" onclick="nuevoSacabocado()">➕ Nuevo Sacabocado</button>
        <button type="button" onclick="volver()">⬅ Volver</button>
      </div>

      <table border="1" width="100%">
        <thead>
          <tr>
            <th>Código</th>
            <th>Marca</th>
            <th>Modelo</th>
            <th>Pieza</th>
            <th>Subpieza</th>
            <th>Material</th>
            <th>Activo</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaSacabocados"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="js/sacabocados_admin.js?v=1"></script>
<script>
  function logout() {
    localStorage.removeItem("token")
    localStorage.removeItem("usuario")
    window.location.href = "login.html"
  }
</script>
</body>
</html>
