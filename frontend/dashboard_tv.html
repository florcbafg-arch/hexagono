<!DOCTYPE html>
<html>

<head>

<title>Producción del día</title>

<link rel="stylesheet" href="styles.css">

<script src="js/authGuard.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>

<script>
  checkAuth("admin")
</script>

<style>

body{
margin:0;
padding:40px;
background:#111;
color:white;
font-family:Arial;
}

h1{
font-size:42px;
margin-bottom:30px;
}

.sector{
margin-bottom:30px;
}

.barra{
background:#444;
height:40px;
border-radius:8px;
overflow:hidden;
}

.barra-fill{
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Producción del día</h1>

<div id="produccion"></div>

<script>

async function cargarProduccion(){

try{

const res = await fetch("/api/dashboard")
const data = await res.json()

const contenedor = document.getElementById("produccion")

contenedor.innerHTML=""

data.forEach(sector=>{

const produccion = sector.produccion || 0
const objetivo = sector.objetivo || 1

const porcentaje = Math.min((produccion/objetivo)*100,100)

let color="rojo"

if(porcentaje>=70) color="verde"
else if(porcentaje>=40) color="amarillo"

contenedor.innerHTML += `

<div class="sector">

<h2>${sector.nombre}</h2>

<div class="barra">

<div class="barra-fill ${color}" style="width:${porcentaje}%">

${produccion} / ${objetivo}

</div>

</div>

</div>

`

})

}catch(err){

console.error("Error dashboard TV",err)

}

}

setInterval(cargarProduccion,3000)

cargarProduccion()

</script>


</body>
</html>
