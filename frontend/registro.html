<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Registro - HEXAFLOW</title>
<link rel="stylesheet" href="styles.css">


</head>

<body>

<div class="auth-container">
<div class="auth-card">

<div class="logo">HEXAFLOW</div>
<div class="subtitulo">Control de producción</div>

<form id="registroForm">

<input type="text" id="nombre" placeholder="Nombre" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Contraseña" required>

<button type="submit">Crear cuenta</button>

</form>

<div class="link">
¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
</div>

</div>


<script>
document
  .getElementById("registroForm")
  .addEventListener("submit", async (e) => {

    e.preventDefault()

    const nombreInput = document.getElementById("nombre")
    const emailInput = document.getElementById("email")
    const passwordInput = document.getElementById("password")

    // 🔒 VALIDACIÓN ANTI-NULL (CLAVE)
    if (!nombreInput || !emailInput || !passwordInput) {
      console.error("❌ Inputs no encontrados", {
        nombreInput,
        emailInput,
        passwordInput
      })
      alert("Error interno: inputs no encontrados")
      return
    }

    const nombre = nombreInput.value
    const email = emailInput.value
    const password = passwordInput.value

    // 🔒 VALIDACIÓN FRONT
if (!nombre || !email || !password) {
  alert("Completar todos los campos")
  return
}

if (!email.includes("@")) {
  alert("Email inválido")
  return
}

if (password.length < 6) {
  alert("La contraseña debe tener al menos 6 caracteres")
  return
}

    try {
      const res = await fetch("/api/auth/registro", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email,
          password,
          nombre
        })
      })

      const data = await res.json()

      if (data.ok) {
        alert("Usuario creado correctamente 🚀")
        window.location.href = "login.html"
      } else {
        alert(data.error || "Error en registro")
      }

    } catch (error) {
      console.error(error)
      alert("Error conectando con el servidor")
    }

  })

   
</script>

</div>
</div>
</body>
</html>
