<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Registro - HEXAFLOW</title>
<link rel="stylesheet" href="styles.css">


</head>

<body>

<div class="auth-container">
<div class="auth-card">

<div class="logo">HEXAFLOW</div>
<div class="subtitulo">Control de producción</div>

<form id="registroForm">

<input type="text" id="nombre" placeholder="Nombre" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Contraseña" required>

<button type="submit">Crear cuenta</button>

</form>

<div class="link">
¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
</div>

</div>


<script>
document
  .getElementById("registroForm")
  .addEventListener("submit", async (e) => {

    e.preventDefault()

    console.log("CLICK REGISTRO 🔥")

    const nombre = document.getElementById("nombre").value
    const email = document.getElementById("usuario").value
    const password = document.getElementById("password").value

    console.log("DATOS:", nombre, email, password)

    try {

      const res = await fetch("/api/auth/registro", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email: email,
          password: password,
          nombre: nombre
        })
      })

      const data = await res.json()

      console.log("RESPUESTA:", data)

      if (data.ok) {
        alert("Usuario creado correctamente 🚀")
        window.location.href = "login.html"
      } else {
        alert(data.error || "Error en registro")
      }

    } catch (error) {
      console.error("ERROR REGISTRO:", error)
      alert("Error conectando con el servidor")
    }

  })

   
</script>



</body>
</div>
</div>
</html>
